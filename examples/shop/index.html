<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MiniShop · on MiniVue</title>
    <style>
      * { box-sizing: border-box; }
      body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: #f4f6f8; color: #1c1e21; }
      main { max-width: 1040px; margin: 0 auto; padding: 20px; }
      a { color: inherit; text-decoration: none; }

      .topbar { display: flex; align-items: center; gap: 16px; padding: 14px 24px; background: #111827; color: #fff; }
      .topbar .brand { font-size: 20px; font-weight: 800; cursor: pointer; }
      .topbar .grow { flex: 1; }
      .cart-btn { font-size: 14px; padding: 8px 14px; border: 1px solid #374151; border-radius: 999px; background: #1f2937; color: #fff; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
      .cart-btn:hover { background: #374151; }
      .pill { background: #22c55e; color: #052e12; border-radius: 999px; padding: 1px 9px; font-size: 12px; font-weight: 800; }

      .card { background: #fff; border: 1px solid #e3e6ea; border-radius: 12px; padding: 14px; margin: 14px 0; }
      .muted { color: #6b7280; }
      .error { color: #b91c1c; }
      .state { padding: 24px 4px; font-size: 15px; }

      .toolbar { display: flex; gap: 8px; align-items: center; }
      input.search { flex: 1; font-size: 15px; padding: 9px 12px; border: 1px solid #cdd2d8; border-radius: 8px; background: #f8fafc; }
      button { font-size: 14px; padding: 7px 12px; border: 1px solid #cdd2d8; border-radius: 8px; background: #fff; cursor: pointer; }
      button.primary { background: #111827; color: #fff; border-color: #111827; }
      button.danger { color: #b91c1c; border-color: #fca5a5; }
      button.block { width: 100%; }

      .chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 4px 0 16px; }
      .chip { text-transform: capitalize; border-radius: 999px; padding: 6px 14px; font-size: 13px; }
      .chip.active { background: #111827; color: #fff; border-color: #111827; }

      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 16px; }
      .pcard { background: #fff; border: 1px solid #e3e6ea; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; transition: box-shadow .15s, transform .15s; }
      .pcard:hover { box-shadow: 0 6px 20px rgba(0,0,0,.09); transform: translateY(-2px); }
      .pcard-img { display: block; aspect-ratio: 1/1; background: #f1f5f9; cursor: pointer; }
      .pcard-img img { width: 100%; height: 100%; object-fit: contain; padding: 10px; }
      .pcard-body { padding: 12px 14px 14px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
      .pcard-title { font-weight: 600; font-size: 14px; line-height: 1.35; cursor: pointer; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
      .pcard-title:hover { color: #2563eb; }
      .pcard-meta { display: flex; justify-content: space-between; font-size: 12px; color: #6b7280; text-transform: capitalize; }
      .rating { color: #b45309; font-weight: 600; }
      .pcard-foot { margin-top: auto; display: flex; align-items: center; justify-content: space-between; }
      .price { font-size: 17px; }

      .back { display: inline-block; margin: 4px 0 12px; color: #2563eb; font-size: 14px; cursor: pointer; }
      .detail { display: grid; grid-template-columns: 320px 1fr; gap: 24px; }
      .detail-img { background: #f1f5f9; border-radius: 12px; display: flex; align-items: center; justify-content: center; padding: 16px; }
      .detail-img img { max-width: 100%; max-height: 320px; object-fit: contain; }
      .detail-body h2 { margin: 0 0 6px; }
      .detail-price { font-size: 26px; font-weight: 800; margin: 12px 0; }
      .detail-desc { line-height: 1.6; color: #374151; }
      .qty { display: flex; align-items: center; gap: 8px; margin-top: 16px; }
      .qty .qty-n { min-width: 28px; text-align: center; font-weight: 700; }
      .qty .buy { margin-left: 8px; }
      .qty.small button { padding: 2px 9px; }

      .backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: flex; justify-content: flex-end; }
      .drawer { width: 380px; max-width: 92vw; height: 100%; background: #fff; display: flex; flex-direction: column; box-shadow: -8px 0 24px rgba(0,0,0,.15); }
      .drawer-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; border-bottom: 1px solid #eef1f4; font-size: 17px; }
      .drawer-list { flex: 1; overflow-y: auto; padding: 8px 16px; }
      .line { display: grid; grid-template-columns: 48px 1fr auto; grid-template-areas: 'img main qty' 'img remove remove'; gap: 6px 12px; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
      .line img { grid-area: img; width: 48px; height: 48px; object-fit: contain; background: #f1f5f9; border-radius: 8px; }
      .line-main { grid-area: main; display: flex; flex-direction: column; }
      .line-title { font-size: 13px; font-weight: 600; }
      .line .qty { grid-area: qty; margin: 0; }
      .line .danger { grid-area: remove; justify-self: start; font-size: 12px; padding: 3px 8px; }
      .drawer-foot { padding: 16px 18px; border-top: 1px solid #eef1f4; }
      .total { display: flex; justify-content: space-between; font-size: 18px; margin-bottom: 12px; }

      @media (max-width: 640px) { .detail { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <!-- Teleport target for the cart drawer -->
    <div id="modals"></div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
