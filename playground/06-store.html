<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MiniVue · Layer 6: Store</title>
    <style>
      body { font-family: -apple-system, system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 20px; line-height: 1.6; }
      h1 { font-size: 22px; }
      .muted { color: #6b7280; font-size: 14px; }
      .bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #111827; color: #fff; border-radius: 10px; }
      .badge { background: #22c55e; color: #062; border-radius: 999px; padding: 2px 10px; font-weight: 700; }
      .card { border: 1px solid #e3e6ea; border-radius: 12px; padding: 16px 20px; margin: 14px 0; background: #fbfcfd; }
      .row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; }
      button { font-size: 14px; padding: 6px 12px; border: 1px solid #cdd2d8; border-radius: 8px; background: #fff; cursor: pointer; }
      button:hover { background: #f0f2f5; }
      code { background: #eef1f4; padding: 1px 6px; border-radius: 4px; font-family: Menlo, monospace; font-size: 13px; }
    </style>
  </head>
  <body>
    <h1>MiniVue · Layer 6: Store</h1>
    <p class="muted">
      Two independent components — the "header" and the "catalog" — share one
      cart state through a store. There are no props or emits between them: both
      call <code>useCart()</code> and get the same instance. The counter in the
      header updates when you add a product in the catalog.
    </p>
    <div id="app"></div>

    <script type="module">
      import { createApp, ref, computed } from '../packages/minivue.js'
      import { createPinia, defineStore, storeToRefs } from '../packages/store/index.js'

      // Cart store in setup style (Composition API).
      const useCart = defineStore('cart', () => {
        const items = ref([])
        const count = computed(() => items.value.length)
        const total = computed(() => items.value.reduce((s, p) => s + p.price, 0))
        const add = (product) => (items.value = [...items.value, product])
        const clear = () => (items.value = [])
        return { items, count, total, add, clear }
      })

      // Header: only reads the store.
      const Header = {
        setup: () => ({ cart: useCart() }),
        template: `
          <div class="bar">
            <strong>MiniShop</strong>
            <span>🛒 <span class="badge">{{ cart.count }}</span> · {{ cart.total }} ₸</span>
          </div>
        `,
      }

      // Catalog: mutates the store.
      const Catalog = {
        setup() {
          const cart = useCart()
          const products = [
            { id: 1, name: 'Keyboard', price: 12000 },
            { id: 2, name: 'Mouse', price: 6000 },
            { id: 3, name: 'Monitor', price: 85000 },
          ]
          return { cart, products }
        },
        template: `
          <div class="card">
            <div class="row" v-for="p in products" :key="p.id">
              <span>{{ p.name }} — {{ p.price }} ₸</span>
              <button @click="cart.add(p)">Add to cart</button>
            </div>
            <p class="muted">{{ cart.count }} items in cart for {{ cart.total }} ₸.
              <button @click="cart.clear()">Clear</button></p>
          </div>
        `,
      }

      const App = {
        components: {},
        setup: () => ({}),
        template: `<div><Header /><Catalog /></div>`,
      }

      const app = createApp(App)
      // Register components globally so the template can find <Header>/<Catalog>.
      app.component('Header', Header)
      app.component('Catalog', Catalog)
      app.use(createPinia())
      app.mount('#app')
    </script>
  </body>
</html>
