<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MiniVue · Layer 11: Built-in Components</title>
    <style>
      body { font-family: -apple-system, system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 20px; line-height: 1.6; }
      h1 { font-size: 22px; }
      .muted { color: #6b7280; font-size: 14px; }
      .card { border: 1px solid #e3e6ea; border-radius: 12px; padding: 16px 20px; margin: 14px 0; background: #fbfcfd; }
      input { font-size: 15px; padding: 8px 10px; border: 1px solid #cdd2d8; border-radius: 8px; }
      button { font-size: 14px; padding: 6px 12px; border: 1px solid #cdd2d8; border-radius: 8px; background: #fff; cursor: pointer; margin-right: 6px; }
      button.active { background: #111827; color: #fff; }
      .backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; }
      .modal { background: #fff; padding: 24px; border-radius: 12px; min-width: 280px; }
      code { background: #eef1f4; padding: 1px 6px; border-radius: 4px; font-family: Menlo, monospace; font-size: 13px; }
    </style>
  </head>
  <body>
    <h1>MiniVue · Layer 11: Built-in Components</h1>
    <p class="muted">
      <code>Teleport</code> moves the modal to the end of <code>body</code>.
      <code>KeepAlive</code> preserves tab state (the field text isn't lost when
      switching). <code>defineAsyncComponent</code> loads a block on demand.
    </p>
    <div id="app"></div>
    <!-- Teleport moves the modal here -->
    <div id="modals"></div>

    <script type="module">
      import { createApp, ref, shallowRef, defineAsyncComponent } from '../packages/minivue.js'

      // Tabs with their own state (to test KeepAlive).
      const TabA = {
        setup: () => ({ text: ref('') }),
        template: `<div class="card">Tab A. Type something and switch tabs:
          <input v-model="text" placeholder="preserved via KeepAlive" /></div>`,
      }
      const TabB = { template: `<div class="card">Tab B — just text.</div>` }

      // Async block: "loads" for half a second.
      const AsyncBlock = defineAsyncComponent(
        () =>
          new Promise((resolve) =>
            setTimeout(() => resolve({ template: '<div class="card">Loaded block ✅</div>' }), 600),
          ),
      )

      const App = {
        components: { TabA, TabB, AsyncBlock },
        setup() {
          const tab = shallowRef(TabA)
          const tabs = [
            { name: 'Tab A', comp: TabA },
            { name: 'Tab B', comp: TabB },
          ]
          const showModal = ref(false)
          return { tab, tabs, showModal }
        },
        template: `
          <div>
            <div class="card">
              <button v-for="t in tabs" :key="t.name"
                      :class="{ active: tab === t.comp }"
                      @click="tab = t.comp">{{ t.name }}</button>
              <button @click="showModal = true">Open modal</button>
            </div>

            <KeepAlive><component :is="tab" /></KeepAlive>

            <AsyncBlock />

            <Teleport to="#modals">
              <div class="backdrop" v-if="showModal" @click.self="showModal = false">
                <div class="modal">
                  <h3>Modal via Teleport</h3>
                  <p class="muted">In markup I'm inside App, but in the DOM I'm in #modals.</p>
                  <button @click="showModal = false">Close</button>
                </div>
              </div>
            </Teleport>
          </div>
        `,
      }

      createApp(App).mount('#app')
    </script>
  </body>
</html>
