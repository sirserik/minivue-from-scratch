<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MiniVue · Layer 5: Router</title>
    <style>
      body { font-family: -apple-system, system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 20px; line-height: 1.6; }
      h1 { font-size: 22px; }
      .muted { color: #6b7280; font-size: 14px; }
      nav { display: flex; gap: 14px; padding: 12px 0; border-bottom: 1px solid #e3e6ea; margin-bottom: 16px; }
      nav a { color: #2563eb; text-decoration: none; }
      nav a:hover { text-decoration: underline; }
      .card { border: 1px solid #e3e6ea; border-radius: 12px; padding: 16px 20px; background: #fbfcfd; }
      code { background: #eef1f4; padding: 1px 6px; border-radius: 4px; font-family: Menlo, monospace; font-size: 13px; }
    </style>
  </head>
  <body>
    <h1>MiniVue · Layer 5: Router</h1>
    <p class="muted">
      A multi-page SPA without reloads. <code>RouterLink</code> changes the URL
      (hash mode: <code>#/about</code>), <code>RouterView</code> renders the
      component for the current route. The <code>:id</code> param reaches the
      component through <code>useRoute()</code>. Watch the address bar as you
      navigate.
    </p>
    <div id="app"></div>

    <script type="module">
      import { createApp } from '../packages/minivue.js'
      import {
        createRouter,
        createWebHashHistory,
        useRoute,
      } from '../packages/router/index.js'

      const Home = { template: '<div class="card"><h2>Home</h2><p>Welcome to MiniVue.</p></div>' }
      const About = { template: '<div class="card"><h2>About</h2><p>A teaching clone of Vue, built from scratch.</p></div>' }
      const User = {
        setup: () => ({ route: useRoute() }),
        template: `
          <div class="card">
            <h2>User #{{ route.params.id }}</h2>
            <p>The :id param is taken from the URL via useRoute().</p>
          </div>
        `,
      }

      const router = createRouter({
        history: createWebHashHistory(),
        routes: [
          { path: '/', component: Home },
          { path: '/about', component: About },
          { path: '/user/:id', component: User },
        ],
      })

      const App = {
        template: `
          <div>
            <nav>
              <RouterLink to="/">Home</RouterLink>
              <RouterLink to="/about">About</RouterLink>
              <RouterLink to="/user/7">User 7</RouterLink>
              <RouterLink to="/user/99">User 99</RouterLink>
            </nav>
            <RouterView />
          </div>
        `,
      }

      createApp(App).use(router).mount('#app')
    </script>
  </body>
</html>
